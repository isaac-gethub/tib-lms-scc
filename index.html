  body{font-family:Arial,sans-serif;background:#f4f6f9;color:#222;min-height:100vh}

  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1F3864 0%,#1F7A8C 100%)}
  .login-box{background:#fff;border-radius:10px;padding:40px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
  .login-logo{text-align:center;margin-bottom:24px}
  .login-logo h1{font-size:22px;color:#1F3864;font-weight:800;letter-spacing:1px}
  .login-logo p{font-size:13px;color:#1F7A8C;margin-top:4px}
  .login-tabs{display:flex;border-bottom:2px solid #e0e6ef;margin-bottom:24px}
  .login-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .login-tab.active{color:#1F3864;border-bottom-color:#1F3864}
  .login-panel{display:none}.login-panel.active{display:block}
  .login-field{margin-bottom:16px}
  .login-field label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .login-field input{width:100%;padding:11px 14px;border:1.5px solid #d0d8e8;border-radius:6px;font-size:16px;transition:border .2s;outline:none}
  .login-field input:focus{border-color:#1F7A8C}
  .login-btn{width:100%;padding:13px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s}
  .login-btn:hover{background:#1F7A8C}
  .login-msg{margin-top:14px;padding:10px 14px;border-radius:6px;font-size:13px;display:none}
  .login-msg.error{background:#fdeaea;color:#c0392b;display:block}
  .login-msg.success{background:#eafaf1;color:#1a7a4a;display:block}
  .login-badges{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .login-badge{background:#EEF3FA;color:#1F3864;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;letter-spacing:.3px}

  /* ── MAIN APP ── */
  #main-app{display:none;min-height:100vh;flex-direction:column}
  
  /* Top bar */
  .topbar{background:#1F3864;color:#fff;display:flex;align-items:center;padding:0 20px;height:54px;position:sticky;top:0;z-index:100;gap:12px}
  .home-btn{
    background:#1F7A8C;
    border:none;
    border-radius:6px;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    width:36px;
    height:36px;
    flex-shrink:0;
    transition:background .2s, transform .15s;
    padding:0;
  }
  .home-btn:hover{background:#C65911;transform:scale(1.08)}
  .home-btn svg{display:block}
    .hamburger{background:none;border:none;cursor:pointer;padding:6px;display:none;flex-direction:column;gap:5px}
  .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
  .topbar-title{font-size:16px;font-weight:800;letter-spacing:.5px;flex:1}
  .topbar-user{font-size:12px;color:#a0bcd8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
  .topbar-logout{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:background .2s;white-space:nowrap}
  .topbar-logout:hover{background:rgba(255,255,255,.1)}

  /* Watermark */
  .watermark-bar{background:#C65911;color:#fff;text-align:center;font-size:11px;font-weight:700;padding:4px;letter-spacing:1px}

  /* Layout */
  .app-body{display:flex;flex:1;min-height:calc(100vh - 54px - 26px)}

  /* Sidebar */
  #sidebar{width:260px;min-width:260px;background:#1F3864;color:#fff;overflow-y:auto;transition:transform .3s;flex-shrink:0}
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
  .sidebar-header{padding:18px 16px 10px;font-size:11px;font-weight:700;color:#7aa3cc;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid rgba(255,255,255,.08)}
  .domain-item{cursor:pointer;padding:14px 16px;border-left:3px solid transparent;transition:all .15s;user-select:none}
  .domain-item:hover{background:rgba(255,255,255,.07);border-left-color:#1F7A8C}
  .domain-item.active{background:rgba(31,122,140,.25);border-left-color:#1F7A8C}
  .domain-item .domain-code{font-size:11px;font-weight:700;color:#1F7A8C;text-transform:uppercase;letter-spacing:1px}
  .domain-item .domain-name{font-size:13px;color:#d8e8f5;margin-top:2px;line-height:1.3}
  .domain-item .domain-count{font-size:11px;color:#7aa3cc;margin-top:2px}
  .proc-list{background:rgba(0,0,0,.15);display:none}
  .proc-list.open{display:block}
  .proc-item{padding:9px 16px 9px 28px;font-size:11.5px;color:#a8c8e8;cursor:pointer;transition:background .15s;border-left:3px solid transparent;line-height:1.45;white-space:normal}
  .proc-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .proc-item.active{background:rgba(31,122,140,.3);color:#fff;border-left-color:#C65911}

  /* Resource Library in sidebar */
  .resource-section{border-top:1px solid rgba(255,255,255,.1);margin-top:8px}
  .resource-header{padding:14px 16px;font-size:11px;font-weight:700;color:#C65911;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
  .resource-item{padding:10px 16px 10px 28px;font-size:12px;color:#a8c8e8;cursor:pointer;transition:background .15s}
  .resource-item:hover{background:rgba(255,255,255,.06);color:#fff}

  /* Content area */
  #content-area{flex:1;padding:28px 32px;overflow-y:auto;background:#f4f6f9}
  .welcome-card{background:#fff;border-radius:8px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.06);max-width:700px}
  .welcome-card h2{font-size:22px;color:#1F3864;margin-bottom:12px}
  .welcome-card p{color:#555;line-height:1.7;margin-bottom:10px;font-size:14px}
  .pathway-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:20px}
  .pathway-card{background:#EEF3FA;border-radius:6px;padding:14px;border-left:4px solid #1F7A8C}
  .pathway-card .pc-code{font-size:11px;font-weight:700;color:#1F7A8C;text-transform:uppercase;letter-spacing:1px}
  .pathway-card .pc-name{font-size:13px;color:#1F3864;font-weight:600;margin-top:4px}
  .pathway-card .pc-count{font-size:12px;color:#888;margin-top:2px}

  /* Procedure content */
  .proc-header{background:#fff;border-radius:8px 8px 0 0;padding:20px 24px;border-bottom:2px solid #1F7A8C;margin-bottom:0}
  .proc-header h2{font-size:18px;color:#1F3864;font-weight:800}
  .proc-header .proc-meta{font-size:12px;color:#1F7A8C;margin-top:4px;font-weight:600}
  .proc-content-box{background:#fff;border-radius:0 0 8px 8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
  .proc-doc-render{font-size:14px;line-height:1.7;color:#333}
  .proc-doc-render h1,.proc-doc-render h2,.proc-doc-render h3{color:#1F3864;margin:16px 0 8px;font-weight:700}
  .proc-doc-render p{margin-bottom:10px}
  .proc-doc-render table{width:100%;border-collapse:collapse;margin:12px 0}
  .proc-doc-render td,.proc-doc-render th{border:1px solid #d0d8e8;padding:8px 10px;font-size:13px}
  .proc-doc-render th{background:#EEF3FA;font-weight:700;color:#1F3864}
  .proc-doc-render ul,.proc-doc-render ol{padding-left:20px;margin-bottom:10px}
  .proc-doc-render li{margin-bottom:4px}
  .loading-spinner{text-align:center;padding:40px;color:#888}
  .loading-spinner .spinner{width:36px;height:36px;border:3px solid #e0e6ef;border-top-color:#1F7A8C;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}

  .error-box{background:#fdeaea;border-left:4px solid #e74c3c;padding:16px;border-radius:4px;color:#c0392b;font-size:13px}

// Build procedure list for a domain
function getProcList(domainCode) {
  const procs = [];
  for (let i=1; i<=10; i++) {
    const num = String(i).padStart(2,'0');
    const code = `${domainCode}${num}`;
    procs.push({ code, title: PROC_NAMES[code] || code });
  }
  return procs;
}

// ── SESSION GUARD ──────────────────────────────────────────────────────────
(async function tibSessionGuard() {
  const TIB_CONSOLE = 'https://tib-student-console.vercel.app';
  try {
    // 1 — Token from Student Console URL
    const urlParams  = new URLSearchParams(window.location.search);
    const tokenParam = urlParams.get('tib_token');
    if (tokenParam) {
      const decoded = decodeURIComponent(tokenParam);
      const { data: { session }, error } = await _supa.auth.setSession({
        access_token:  decoded,
        refresh_token: decoded
      });
      if (!error && session) {
        const clean = window.location.pathname +
          (urlParams.toString().replace(/[&?]?tib_token=[^&]*/g,'').replace(/^&/,'?')||'');
        window.history.replaceState({},'',clean||window.location.pathname);
        _user  = session.user;
        _email = session.user.email;
        showApp();
        return;
      }
    }
    // 2 — Existing session
    const { data: { session }, error } = await _supa.auth.getSession();
    if (!error && session) {
      _user  = session.user;
      _email = session.user.email;
      showApp();
      return;
    }
    // 3 — No session
    window.location.href = TIB_CONSOLE;
  } catch(e) {
    console.error('[tibSessionGuard]', e.message);
    window.location.href = TIB_CONSOLE;
  }
})();

// ── AUTH FUNCTIONS ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='signin'?0:1)));
  document.getElementById('tab-signin').classList.toggle('active', tab==='signin');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}

async function doSignIn() {
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  const msg = document.getElementById('si-msg');
  msg.className = 'login-msg';
  if (!email||!pass) { msg.className='login-msg error'; msg.textContent='Please enter email and password.'; return; }
  const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.className='login-msg error'; msg.textContent=error.message; return; }
  if (email.toLowerCase() === SUPER_ADMIN) {
    _user = data.user; _email = email;
    showApp();
    return;
  }
  // Check enrollment
  const { data: enroll } = await _supa.from('enrollments')
    .select('is_active,expiry_date')
    .eq('user_id', data.user.id)
    .eq('course', COURSE)
    .eq('is_active', true)
    .maybeSingle();
  if (!enroll) {
    await _supa.auth.signOut();
    msg.className='login-msg error';
    msg.textContent='No active SCC enrolment found. Please contact admin@tib-systems.com';
    return;
  }
  if (enroll.expiry_date && new Date(enroll.expiry_date) < new Date()) {
    await _supa.auth.signOut();
    msg.className='login-msg error'; msg.textContent='Your access has expired. Please contact admin@tib-systems.com'; return;
  }
  _user = data.user; _email = email;
  showApp();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const msg = document.getElementById('reg-msg');
  msg.className = 'login-msg';
  if (!name||!email||!pass) { msg.className='login-msg error'; msg.textContent='All fields required.'; return; }
  if (pass.length < 8) { msg.className='login-msg error'; msg.textContent='Password must be at least 8 characters.'; return; }
  const { data, error } = await _supa.auth.signUp({
    email, password: pass,
    options: { data:{ full_name:name }, emailRedirectTo: LMS_URL }
  });
  if (error) { msg.className='login-msg error'; msg.textContent=error.message; return; }
  msg.className='login-msg success';
  msg.textContent='Account created! Check your email to confirm, then sign in. If you purchased through our website, your access will be activated within a few minutes.';
}

async function doSignOut() {
  await _supa.auth.signOut();
  location.reload();
}

// ── SHOW APP ───────────────────────────────────────────────────────────────
function showApp() {
  document.body.style.visibility='visible';
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('main-app');
  app.style.display = 'flex';
  document.getElementById('topbar-user').textContent = _email;
  document.getElementById('watermark-bar').textContent = `TIB SYSTEMS — LICENSED TO: ${_email.toUpperCase()} — UNAUTHORISED DISTRIBUTION PROHIBITED`;
  buildSidebar();
  if(location.hash==='#resources-section1'){
    history.replaceState(null,'',location.pathname+location.search);
    showResources('Section 1 — SAP Tasks (In-System Audit, Application Controls, Security)');
  }else{
    showWelcome();
  }
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const dl = document.getElementById('domain-list');
  dl.innerHTML = '';
  DOMAINS.forEach(dom => {
    const di = document.createElement('div');
    di.className = 'domain-item';
    di.id = `dom-${dom.code}`;
    di.innerHTML = `<div class="domain-code">Domain ${dom.code}</div><div class="domain-name">${dom.name}</div><div class="domain-count">${dom.procs} procedures</div>`;
    di.onclick = () => toggleDomain(dom.code);
    dl.appendChild(di);
    const pl = document.createElement('div');
    pl.className = 'proc-list';
    pl.id = `procs-${dom.code}`;
    getProcList(dom.code).forEach(proc => {
      const pi = document.createElement('div');
      pi.className = 'proc-item';
      pi.id = `proc-${proc.code}`;
      const display = proc.code.slice(0,1) + '-' + proc.code.slice(1);
      const name = proc.title ? ` — ${proc.title}` : '';
      pi.textContent = display + name;
      pi.onclick = () => loadProcedure(dom.code, proc.code);
      pl.appendChild(pi);
    });
    dl.appendChild(pl);
  });

  const rl = document.getElementById('resource-links');
  RESOURCES.forEach((r,i) => {
    const ri = document.createElement('div');
    ri.className = 'resource-item';
    ri.textContent = r.label;
    ri.onclick = () => showResourceDetail(i);
    rl.appendChild(ri);
  });
}

function toggleDomain(code) {
  const domEl = document.getElementById(`dom-${code}`);
  const procEl = document.getElementById(`procs-${code}`);
  const isOpen = _openDomains.has(code);
  // Close all
  _openDomains.forEach(c => {
    document.getElementById(`dom-${c}`)?.classList.remove('active');
    document.getElementById(`procs-${c}`)?.classList.remove('open');
  });
  _openDomains.clear();
  if (!isOpen) {
    _openDomains.add(code);
    domEl.classList.add('active');
    procEl.classList.add('open');
  }
  closeSidebar();
}

// ── MOBILE SIDEBAR ─────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

// ── LOAD PROCEDURE ─────────────────────────────────────────────────────────
async function loadProcedure(domainCode, procCode) {
  // Clear active states
  document.querySelectorAll('.proc-item').forEach(el=>el.classList.remove('active'));
  const procEl = document.getElementById(`proc-${procCode}`);
  if (procEl) procEl.classList.add('active');
  _activeProc = procCode;
  closeSidebar();

  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="proc-header">
      <h2>${procCode.slice(0,1)+'-'+procCode.slice(1)} &mdash; ${PROC_NAMES[procCode]||procCode}</h2>
      <div class="proc-meta">Domain ${domainCode} — ${DOMAINS.find(d=>d.code===domainCode)?.name||''}</div>
      <a href="#resources-section1" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;font-size:12px;font-weight:700;color:#1F7A8C;text-decoration:none;border:1px solid #1F7A8C;padding:6px 14px;border-radius:5px">&#128214; Read the Section 1 theory first &#8599;</a>
    </div>
    <div class="proc-content-box">
      <div class="loading-spinner"><div class="spinner"></div><div>Loading procedure document...</div></div>
    </div>`;

  // Fetch DOCX from B2
  const fileName = buildFilename(procCode);
  if (!fileName) {
    ci.querySelector('.proc-content-box').innerHTML = `<div class="error-box"><strong>Filename not found for procedure ${procCode}.</strong></div>`;
    return;
  }
  const url = `${B2_BASE}/${fileName}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const arrayBuf = await resp.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuf });
    ci.querySelector('.proc-content-box').innerHTML = `<div class="proc-doc-render">${result.value}</div>`;
    addWatermarkOverlay(ci.querySelector('.proc-doc-render'));
  } catch(e) {
    ci.querySelector('.proc-content-box').innerHTML = `
      <div class="error-box">
        <strong>Unable to load procedure document.</strong><br>
        File: ${fileName}<br>
        Please ensure the document has been uploaded to Backblaze B2 (scc-cl-docs/${fileName}).<br>
        Error: ${e.message}
      </div>`;
  }
}

function addWatermarkOverlay(el) {
  const wm = document.createElement('div');
  wm.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:14px;color:rgba(31,56,100,0.06);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap;z-index:0';
  wm.textContent = `TIB SYSTEMS — ${_email}`;
  el.style.position = 'relative';
  el.appendChild(wm);
}

// ── RESOURCES ──────────────────────────────────────────────────────────────
function showResources(focusCategory) {
  const ci = document.getElementById('content-inner');
  const categories=[];
  const byCategory={};
  RESOURCES.forEach((r,i)=>{
    if(!byCategory[r.category]){byCategory[r.category]=[];categories.push(r.category);}
    byCategory[r.category].push(i);
  });
  const sectionsHtml=categories.map((cat,catIdx)=>{
    const indices=byCategory[cat];
    const isOpen=focusCategory?(cat===focusCategory):(catIdx===0);
    const itemsHtml=indices.map(i=>{
      const r=RESOURCES[i];
      return `<div style="border:1px solid #e0e6ef;border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer" onclick="showResourceDetail(${i})">
        <div style="font-size:14px;font-weight:700;color:#1F3864;margin-bottom:4px">${r.label}</div>
        <div style="font-size:12px;color:#555">${r.desc}</div>
      </div>`;
    }).join('');
    return `<details id="cat-${catIdx}" style="margin-bottom:16px" ${isOpen?'open':''}>
      <summary style="cursor:pointer;font-size:13px;font-weight:800;color:#C65911;text-transform:uppercase;letter-spacing:.5px;padding:10px 0;border-bottom:2px solid #e0e6ef;margin-bottom:10px">${cat} (${indices.length})</summary>
      ${itemsHtml}
    </details>`;
  }).join('');
  ci.innerHTML = `
    <div class="resource-card">
      <h2>&#128194; Resource Library</h2>
      <p>Your course materials are available below. These documents are licensed exclusively to your account — do not share or distribute. Click any item to view it inline.</p>
      ${sectionsHtml}
    </div>`;
  closeSidebar();
  if(focusCategory){
    const idx=categories.indexOf(focusCategory);
    setTimeout(()=>{
      const el=document.getElementById(`cat-${idx}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }
}

function showResourceDetail(idx) {
  const r = RESOURCES[idx];
  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="resource-card">
      <h2>${r.label}</h2>
      <p>${r.desc}</p>
      <p style="font-size:12px;color:#888;margin-bottom:16px">&#9888; This document is watermarked to your account: ${_email}. Redistribution is prohibited under your licence agreement.</p>
      <div class="loading-spinner"><div class="spinner"></div><div>Loading document...</div></div>
    </div>`;
  const url = `${r.base}/${r.file}`;
  fetch(url).then(resp => {
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.arrayBuffer();
  }).then(buf => mammoth.convertToHtml({ arrayBuffer: buf }))
    .then(result => {
      ci.querySelector('.resource-card').innerHTML = `
        <button onclick="showResources()" style="background:none;border:1px solid #1F7A8C;color:#1F7A8C;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:16px">&larr; Back to Resource Library</button>
        <h2>${r.label}</h2>
        <p style="font-size:12px;color:#C65911;margin-bottom:16px;font-weight:700">LICENSED TO: ${_email.toUpperCase()}</p>
        <div class="proc-doc-render">${result.value}</div>`;
      addWatermarkOverlay(ci.querySelector('.proc-doc-render'));
    })
    .catch(e => {
      ci.querySelector('.resource-card').innerHTML = `
        <h2>${r.label}</h2>
        <div class="error-box">Document not yet available at ${url}.<br>Error: ${e.message}</div>`;
    });
  closeSidebar();
}
