// ── SESSION GUARD ──────────────────────────────────────────────────────────
(async function tibSessionGuard() {
  const { data: { session } } = await _supa.auth.getSession();
  if (!session) return; // stays on login
  const { data: enroll } = await _supa.from('enrollments')
    .select('is_active,expiry_date')
    .eq('user_id', session.user.id)
    .eq('course', COURSE)
    .eq('is_active', true)
    .maybeSingle();
  if (!enroll) return; // not enrolled — stays on login
  if (enroll.expiry_date && new Date(enroll.expiry_date) < new Date()) return;
  _user = session.user;
  _email = session.user.email;
  showApp();
})();

// ── AUTH FUNCTIONS ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='signin'?0:1)));
  document.getElementById('tab-signin').classList.toggle('active', tab==='signin');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}

async function doSignIn() {
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  const msg = document.getElementById('si-msg');
  msg.className = 'login-msg';
  if (!email||!pass) { msg.className='login-msg error'; msg.textContent='Please enter email and password.'; return; }
  const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.className='login-msg error'; msg.textContent=error.message; return; }
  // Check enrollment
  const { data: enroll } = await _supa.from('enrollments')
    .select('is_active,expiry_date')
    .eq('user_id', data.user.id)
    .eq('course', COURSE)
    .eq('is_active', true)
    .maybeSingle();
  if (!enroll) {
    await _supa.auth.signOut();
    msg.className='login-msg error';
    msg.textContent='No active SCC enrolment found. Please contact admin@tib-systems.com';
    return;
  }
  if (enroll.expiry_date && new Date(enroll.expiry_date) < new Date()) {
    await _supa.auth.signOut();
    msg.className='login-msg error'; msg.textContent='Your access has expired. Please contact admin@tib-systems.com'; return;
  }
  _user = data.user; _email = email;
  showApp();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const msg = document.getElementById('reg-msg');
  msg.className = 'login-msg';
  if (!name||!email||!pass) { msg.className='login-msg error'; msg.textContent='All fields required.'; return; }
  if (pass.length < 8) { msg.className='login-msg error'; msg.textContent='Password must be at least 8 characters.'; return; }
  const { data, error } = await _supa.auth.signUp({
    email, password: pass,
    options: { data:{ full_name:name }, emailRedirectTo: LMS_URL }
  });
  if (error) { msg.className='login-msg error'; msg.textContent=error.message; return; }
  msg.className='login-msg success';
  msg.textContent='Account created! Check your email to confirm, then sign in. If you purchased through our website, your access will be activated within a few minutes.';
}

async function doSignOut() {
  await _supa.auth.signOut();
  location.reload();
}

// ── SHOW APP ───────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('main-app');
  app.style.display = 'flex';
  document.getElementById('topbar-user').textContent = _email;
  document.getElementById('watermark-bar').textContent = `TIB SYSTEMS — LICENSED TO: ${_email.toUpperCase()} — UNAUTHORISED DISTRIBUTION PROHIBITED`;
  buildSidebar();
  showWelcome();
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const dl = document.getElementById('domain-list');
  dl.innerHTML = '';
  DOMAINS.forEach(dom => {
    const di = document.createElement('div');
    di.className = 'domain-item';
    di.id = `dom-${dom.code}`;
    di.innerHTML = `<div class="domain-code">Domain ${dom.code}</div><div class="domain-name">${dom.name}</div><div class="domain-count">${dom.procs} procedures</div>`;
    di.onclick = () => toggleDomain(dom.code);
    dl.appendChild(di);
    const pl = document.createElement('div');
    pl.className = 'proc-list';
    pl.id = `procs-${dom.code}`;
    getProcList(dom.code).forEach(proc => {
      const pi = document.createElement('div');
      pi.className = 'proc-item';
      pi.id = `proc-${proc.code}`;
      pi.textContent = proc.code.slice(0,1) + '-' + proc.code.slice(1);
      pi.onclick = () => loadProcedure(dom.code, proc.code);
      pl.appendChild(pi);
    });
    dl.appendChild(pl);
  });

  const rl = document.getElementById('resource-links');
  RESOURCES.forEach((r,i) => {
    const ri = document.createElement('div');
    ri.className = 'resource-item';
    ri.textContent = r.label;
    ri.onclick = () => showResourceDetail(i);
    rl.appendChild(ri);
  });
}

function toggleDomain(code) {
  const domEl = document.getElementById(`dom-${code}`);
  const procEl = document.getElementById(`procs-${code}`);
  const isOpen = _openDomains.has(code);
  // Close all
  _openDomains.forEach(c => {
    document.getElementById(`dom-${c}`)?.classList.remove('active');
    document.getElementById(`procs-${c}`)?.classList.remove('open');
  });
  _openDomains.clear();
  if (!isOpen) {
    _openDomains.add(code);
    domEl.classList.add('active');
    procEl.classList.add('open');
  }
  closeSidebar();
}

// ── MOBILE SIDEBAR ─────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

// ── WELCOME SCREEN ─────────────────────────────────────────────────────────
function showWelcome() {
  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="welcome-card">
      <h2>Welcome to the TIB SCC Programme</h2>
      <p>You are enrolled in the <strong>Senior Controls Consultant (SCC) Programme</strong> — 7 SAP audit domains, 70 procedures, Big 4-calibrated standards.</p>
      <p>Select a domain from the left sidebar to begin, or use the Resource Library to access your course materials.</p>
      <div class="pathway-grid">
        ${DOMAINS.map(d=>`
          <div class="pathway-card" onclick="toggleDomain('${d.code}')">
            <div class="pc-code">Domain ${d.code}</div>
            <div class="pc-name">${d.name}</div>
            <div class="pc-count">${d.procs} procedures</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── LOAD PROCEDURE ─────────────────────────────────────────────────────────
async function loadProcedure(domainCode, procCode) {
  // Clear active states
  document.querySelectorAll('.proc-item').forEach(el=>el.classList.remove('active'));
  const procEl = document.getElementById(`proc-${procCode}`);
  if (procEl) procEl.classList.add('active');
  _activeProc = procCode;
  closeSidebar();

  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="proc-header">
      <h2>${procCode}</h2>
      <div class="proc-meta">Domain ${domainCode} — ${DOMAINS.find(d=>d.code===domainCode)?.name||''}</div>
    </div>
    <div class="proc-content-box">
      <div class="loading-spinner"><div class="spinner"></div><div>Loading procedure document...</div></div>
    </div>`;

  // Fetch DOCX from B2
  const fileName = buildFilename(procCode);
  if (!fileName) {
    ci.querySelector('.proc-content-box').innerHTML = `<div class="error-box"><strong>Filename not found for procedure ${procCode}.</strong></div>`;
    return;
  }
  const url = `${B2_BASE}/${fileName}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const arrayBuf = await resp.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuf });
    ci.querySelector('.proc-content-box').innerHTML = `<div class="proc-doc-render">${result.value}</div>`;
    addWatermarkOverlay(ci.querySelector('.proc-doc-render'));
  } catch(e) {
    ci.querySelector('.proc-content-box').innerHTML = `
      <div class="error-box">
        <strong>Unable to load procedure document.</strong><br>
        File: ${fileName}<br>
        Please ensure the document has been uploaded to Backblaze B2 (scc-cl-docs/${fileName}).<br>
        Error: ${e.message}
      </div>`;
  }
}

function addWatermarkOverlay(el) {
  const wm = document.createElement('div');
  wm.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:14px;color:rgba(31,56,100,0.06);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap;z-index:0';
  wm.textContent = `TIB SYSTEMS — ${_email}`;
  el.style.position = 'relative';
  el.appendChild(wm);
}

// ── RESOURCES ──────────────────────────────────────────────────────────────
function showResources() {
  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="resource-card">
      <h2>&#128194; Resource Library</h2>
      <p>Your course materials are available below. These documents are licensed exclusively to your account — do not share or distribute.</p>
      ${RESOURCES.map((r,i)=>`
        <div style="border:1px solid #e0e6ef;border-radius:6px;padding:16px;margin-bottom:14px">
          <div style="font-size:15px;font-weight:700;color:#1F3864;margin-bottom:6px">${r.label}</div>
          <div style="font-size:13px;color:#555;margin-bottom:12px">${r.desc}</div>
          <button class="resource-download-btn" onclick="showResourceDetail(${i})">View Document</button>
        </div>`).join('')}
    </div>`;
  closeSidebar();
}

function showResourceDetail(idx) {
  const r = RESOURCES[idx];
  const ci = document.getElementById('content-inner');
  ci.innerHTML = `
    <div class="resource-card">
      <h2>${r.label}</h2>
      <p>${r.desc}</p>
      <p style="font-size:12px;color:#888;margin-bottom:16px">&#9888; This document is watermarked to your account: ${_email}. Redistribution is prohibited under your licence agreement.</p>
      <div class="loading-spinner"><div class="spinner"></div><div>Loading document...</div></div>
    </div>`;
  const url = `${B2_BASE}/${r.file}`;
  fetch(url).then(resp => {
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.arrayBuffer();
  }).then(buf => mammoth.convertToHtml({ arrayBuffer: buf }))
    .then(result => {
      ci.querySelector('.resource-card').innerHTML = `
        <h2>${r.label}</h2>
        <p style="font-size:12px;color:#C65911;margin-bottom:16px;font-weight:700">LICENSED TO: ${_email.toUpperCase()}</p>
        <div class="proc-doc-render">${result.value}</div>`;
    })
    .catch(e => {
      ci.querySelector('.resource-card').innerHTML = `
        <h2>${r.label}</h2>
        <div class="error-box">Document not yet available at ${url}.<br>Error: ${e.message}</div>`;
    });
  closeSidebar();
}

// ── IP PROTECTION ──────────────────────────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key==='F12'||(e.ctrlKey&&['u','U','s','S','c','C','p','P'].includes(e.key))) e.preventDefault();
});
